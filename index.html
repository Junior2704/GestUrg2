<!DOCTYPE html>
<html lang="fr">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta charset="UTF-8">
  <title>🚑 GestUrg2</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  /* Chrome, Edge, Opera */
::-webkit-scrollbar {
    width: 12px;
    height: 12px;
}

::-webkit-scrollbar-track {
    background: #eef3ff;
    border-radius: 10px;
}

::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, #2196f3, #1565c0);
    border-radius: 10px;
    border: 2px solid #eef3ff;
}

::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(180deg, #42a5f5, #1976d2);
}

/* Firefox */
* {
    scrollbar-width: thin;
    scrollbar-color: #2196f3 #eef3ff;
}</style>
</head>

<body>

  <!-- Loader universel -->
  <iframe src="loader.html"></iframe>

  <script>
    function isMobileDevice() {
      return (
        /Android|iPhone|iPad|iPod|webOS|BlackBerry|Windows Phone/i.test(navigator.userAgent)
        || window.matchMedia("(max-width: 850px)").matches
      );
    }

    window.onload = () => {
      setTimeout(() => {
        window.location.href = isMobileDevice()
          ? "connexion-mobile.html"
          : "connexion.html";
      }, 2500);
    };

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js')
        .then(() => console.log("Service Worker enregistré"));
    }
  </script>

</body>
</html>
