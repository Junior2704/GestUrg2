<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Jetons USB</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    padding: 20px;
}

h1 { margin-bottom: 10px; }

.section {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
}

.usb-item {
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    margin-bottom: 10px;
    cursor: pointer;
}

.usb-item.selected {
    border: 2px solid #007bff;
}

button {
    margin-top: 10px;
    padding: 8px 15px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.add-btn { background: #28a745; color: white; }
.delete-btn { background: #dc3545; color: white; }

.blocked {
    text-align:center;
    color:red;
    font-weight:bold;
    margin-top:50px;
}
</style>
</head>

<body>

<h1>Gestion des jetons USB</h1>

<button id="retourBtn">← Retour</button>

<div id="blocked" class="blocked" style="display:none;">
    ❌ Accès refusé<br><br>
    Cette page est uniquement accessible via l’application desktop Electron.
</div>

<div id="app">

<div class="section">
    <h2>Jetons enregistrés</h2>
    <div id="jetonsExistants">Chargement...</div>
</div>

<div class="section">
    <h2>Ajouter un jeton</h2>
    <div id="usbList">Chargement...</div>
    <button class="add-btn" onclick="ajouterJeton()">Ajouter ce jeton</button>
</div>

</div>

<script type="module">
/* =========================================================
   🔒 ELECTRON CHECK
========================================================= */

const isElectron = () =>
    typeof window !== "undefined" &&
    window.process &&
    window.process.versions &&
    window.process.versions.electron;

if (!isElectron()) {
    document.getElementById("app").style.display = "none";
    document.getElementById("blocked").style.display = "block";
    throw new Error("Electron requis");
}

/* =========================================================
   🔌 IPC ELECTRON
========================================================= */

const { ipcRenderer } = window.require ? window.require('electron') : {};

/* =========================================================
   🔥 FIREBASE v10 (MODULAR)
========================================================= */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
    getFirestore,
    doc,
    getDoc,
    updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* =========================================================
   🔥 INIT FIREBASE
========================================================= */

const firebaseConfig = {
    apiKey: "XXX",
    authDomain: "XXX",
    projectId: "XXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* =========================================================
   📌 PARAMS
========================================================= */

const params = new URLSearchParams(window.location.search);
const medecinId = params.get("id");

let selectedUSB = null;
let jetons = [];

/* =========================================================
   🔄 CHARGER JETONS
========================================================= */

async function chargerJetons() {

    const ref = doc(db, "medecins", medecinId);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
        document.getElementById("jetonsExistants").innerHTML =
            "Médecin introuvable";
        return;
    }

    jetons = snap.data().jetonsUSB || [];

    const container = document.getElementById("jetonsExistants");
    container.innerHTML = "";

    if (jetons.length === 0) {
        container.innerHTML = "Aucun jeton enregistré";
        return;
    }

    jetons.forEach((j, index) => {

        const div = document.createElement("div");
        div.className = "usb-item";

        div.innerHTML = `
            <b>${j.description || "USB"}</b><br>
            Serial: ${j.serialNumber || "N/A"}<br>
            <button class="delete-btn" onclick="supprimerJeton(${index})">
                Supprimer
            </button>
        `;

        container.appendChild(div);
    });
}

/* =========================================================
   ❌ SUPPRIMER JETON
========================================================= */

async function supprimerJeton(index) {

    const ref = doc(db, "medecins", medecinId);

    jetons.splice(index, 1);

    await updateDoc(ref, {
        jetonsUSB: jetons
    });

    chargerJetons();
}

/* =========================================================
   📡 USB (Electron only)
========================================================= */

async function chargerUSB() {

    const devices = await ipcRenderer.invoke('scan-usb');

    const container = document.getElementById("usbList");
    container.innerHTML = "";

    devices.forEach(d => {

        const div = document.createElement("div");
        div.className = "usb-item";

        div.innerHTML = `
            <b>${d.description || "USB"}</b><br>
            Serial: ${d.serialNumber || "N/A"}
        `;

        div.onclick = () => {
            document.querySelectorAll('.usb-item')
                .forEach(e => e.classList.remove('selected'));

            div.classList.add('selected');
            selectedUSB = d;
        };

        container.appendChild(div);
    });
}

/* =========================================================
   ➕ AJOUT JETON
========================================================= */

async function ajouterJeton() {

    if (!selectedUSB) {
        alert("Sélectionne une clé USB");
        return;
    }

    const serial =
        selectedUSB.serialNumber ||
        `${selectedUSB.vendorId}-${selectedUSB.productId}`;

    const exists = jetons.some(j => j.serialNumber === serial);

    if (exists) {
        alert("Ce jeton existe déjà");
        return;
    }

    const nouveau = {
        serialNumber: serial,
        description: selectedUSB.description || "USB"
    };

    jetons.push(nouveau);

    const ref = doc(db, "medecins", medecinId);

    await updateDoc(ref, {
        jetonsUSB: jetons
    });

    selectedUSB = null;

    chargerJetons();
    chargerUSB();
}

/* =========================================================
   ↩️ RETOUR
========================================================= */

document.getElementById("retourBtn").onclick = () => {
    window.history.back();
};

/* =========================================================
   🚀 INIT
========================================================= */

chargerJetons();
chargerUSB();

</script>

</body>
</html>
