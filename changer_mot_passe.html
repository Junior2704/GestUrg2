<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Changer le mot de passe</title>
  <link rel="icon" type="image/jpeg" href="logo.png" />
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      updatePassword,
      signOut,
      reauthenticateWithCredential,
      EmailAuthProvider
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // --- Configuration Firebase ---
    const firebaseConfig = {
      apiKey: "AIzaSyBKp5-7NNy0Gyl0tNbDgD-BxucYdg8ArWo",
      authDomain: "urgences-a8ed4.firebaseapp.com",
      projectId: "urgences-a8ed4"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- Vérifie que l’utilisateur est connecté ---
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "index.html";
      } else {
        document.getElementById("emailDisplay").textContent = user.email;
      }
    });

    // --- Fonction de changement de mot de passe ---
    window.changerMotDePasse = async function () {
      const ancien = document.getElementById("oldPassword").value;
      const nouveau = document.getElementById("newPassword").value;
      const confirmation = document.getElementById("confirmPassword").value;
      const msg = document.getElementById("message");
      msg.textContent = "";
      msg.style.color = "red";

      if (!ancien || !nouveau || !confirmation) {
        msg.textContent = "Veuillez remplir tous les champs.";
        return;
      }
     if (
    nouveau.length < 8 ||
    !/[A-Z]/.test(nouveau) ||
    !/[a-z]/.test(nouveau) ||
    !/[0-9]/.test(nouveau) ||
    !/[^A-Za-z0-9]/.test(nouveau)
) {
        msg.textContent = "Le mot de passe est trop faible.";
        return;
      }
      if (nouveau !== confirmation) {
        msg.textContent = "Les deux nouveaux mots de passe ne correspondent pas.";
        return;
      }

      try {
        const user = auth.currentUser;
        if (!user) {
          msg.textContent = "Aucun utilisateur connecté.";
          return;
        }

        // 🔐 Vérification de l’ancien mot de passe
        const credential = EmailAuthProvider.credential(user.email, ancien);
        await reauthenticateWithCredential(user, credential);

        // ✅ Si l'ancien mot de passe est correct, on met à jour
        await updatePassword(user, nouveau);

        // (Optionnel) Met à jour Firestore
        await updateDoc(doc(db, "medecins", user.uid), { doitChangerMDP: false });

        msg.style.color = "green";
        msg.textContent = "✅ Mot de passe modifié avec succès ! Déconnexion...";

        setTimeout(async () => {
          await signOut(auth);
          window.location.href = "index.html";
        }, 2000);
      } catch (error) {
        console.error(error);
        if (error.code === "auth/wrong-password") {
          msg.textContent = "Ancien mot de passe incorrect.";
        } else {
          msg.textContent = "Erreur : " + error.message;
        }
      }
    };
    function evaluerSecurite(mdp) {
  let score = 0;

  if (mdp.length >= 8) score++;
  if (/[A-Z]/.test(mdp)) score++;
  if (/[a-z]/.test(mdp)) score++;
  if (/[0-9]/.test(mdp)) score++;
  if (/[^A-Za-z0-9]/.test(mdp)) score++;

  const bar = document.getElementById("securityBar");
  const text = document.getElementById("securityText");
  const btn = document.getElementById("validateBtn");

  switch (score) {
    case 0:
    case 1:
      bar.style.width = "20%";
      bar.style.background = "#d32f2f";
      text.textContent = "Sécurité : Très faible";
      btn.disabled = true;
      break;

    case 2:
      bar.style.width = "40%";
      bar.style.background = "#f57c00";
      text.textContent = "Sécurité : Faible";
      btn.disabled = true;
      break;

    case 3:
      bar.style.width = "60%";
      bar.style.background = "#fbc02d";
      text.textContent = "Sécurité : Moyenne";
      btn.disabled = true;
      break;

    case 4:
      bar.style.width = "80%";
      bar.style.background = "#7cb342";
      text.textContent = "Sécurité : Bonne";
      btn.disabled = false;
      break;

    case 5:
      bar.style.width = "100%";
      bar.style.background = "#2e7d32";
      text.textContent = "Sécurité : Excellente";
      btn.disabled = false;
      break;
  }
}

document.addEventListener("DOMContentLoaded", () => {
  document
    .getElementById("newPassword")
    .addEventListener("input", function () {
      evaluerSecurite(this.value);
    });
});
  </script>

  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f4f4f4;
    }
    #box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      text-align: center;
      width: 350px;
    }
    input {
      padding: 10px;
      width: 100%;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 1rem;
    }
    button {
      padding: 10px 20px;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.1rem;
      width: 100%;
    }
    button:hover {
      background: #005ea1;
    }
    #message {
      margin-top: 15px;
      min-height: 24px;
      font-weight: bold;
    }
    #emailDisplay {
      font-weight: bold;
      color: #0078d4;
      margin-bottom: 10px;
      display: block;
    }
  /* Chrome, Edge, Opera */
::-webkit-scrollbar {
    width: 12px;
    height: 12px;
}

::-webkit-scrollbar-track {
    background: #eef3ff;
    border-radius: 10px;
}

::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, #2196f3, #1565c0);
    border-radius: 10px;
    border: 2px solid #eef3ff;
}

::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(180deg, #42a5f5, #1976d2);
}

/* Firefox */
* {
    scrollbar-width: thin;
    scrollbar-color: #2196f3 #eef3ff;
}
#securityContainer {
  width: 100%;
  height: 12px;
  background: #ddd;
  border-radius: 30px;
  overflow: hidden;
  margin-bottom: 8px;
}

#securityBar {
  width: 0%;
  height: 100%;
  transition: all 0.3s ease;
  border-radius: 30px;
}

#securityText {
  font-size: 0.9rem;
  margin-bottom: 12px;
  font-weight: bold;
}

button:disabled {
  background: #aaa;
  cursor: not-allowed;
}</style>
</head>

<body>
  <div id="box">
    <h2>🔑 Changer mon mot de passe</h2>
    <p>Adresse e-mail : <span id="emailDisplay">chargement...</span></p>

    <input type="password" id="oldPassword" placeholder="Ancien mot de passe" required />
    <input type="password" id="newPassword" placeholder="Nouveau mot de passe" required />
<div id="securityContainer">
  <div id="securityBar"></div>
</div>
<div id="securityText">Sécurité : Très faible</div>
    <input type="password" id="confirmPassword" placeholder="Confirmer le nouveau mot de passe" required />
    <button id="validateBtn" onclick="changerMotDePasse()" disabled>Valider</button>

    <div id="message"></div>
  </div>
</body>
</html>
