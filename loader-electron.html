<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chargement GestUrg2</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

/* 🔥 IMPORTANT : fond totalement transparent */
body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: transparent;
  overflow: hidden;
}

/* ===== Container flottant ===== */
.loader-box{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

/* ===== Logo container ===== */
.logo-container{
position:relative;
width:130px;
height:130px;
}

/* 🌟 halo lumineux doux */
.logo-glow{
position:absolute;
inset:0;
border-radius:50%;
background:radial-gradient(circle, rgba(0,140,255,0.45), transparent 70%);
animation: glow 2.5s ease-in-out infinite;
filter: blur(2px);
}

/* 🔄 anneau loader */
.loader-ring{
position:absolute;
inset:-18px;
border-radius:50%;
border:3px solid rgba(0,120,200,0.12);
border-top:3px solid #1b6ca8;
animation: spin 2.6s linear infinite;
}

/* 🧠 logo */
.logo{
position:absolute;
inset:0;
background:url("logog2.png") center/contain no-repeat;
animation: float 3s ease-in-out infinite;
filter: drop-shadow(0 10px 25px rgba(0,0,0,0.25));
}

/* ===== animations ===== */

@keyframes spin{
0%{transform: rotate(0deg);}
100%{transform: rotate(360deg);}
}

@keyframes float{
0%{transform: translateY(0px) scale(1);}
50%{transform: translateY(-8px) scale(1.04);}
100%{transform: translateY(0px) scale(1);}
}

@keyframes glow{
0%{opacity:0.4; transform:scale(0.9);}
50%{opacity:0.9; transform:scale(1.2);}
100%{opacity:0.4; transform:scale(0.9);}
}

/* texte optionnel discret */
.status {
  margin-top:18px;
  font-size:13px;
  color: rgba(20,40,60,0.6);
  text-align:center;
}

/* dots anim */
.dots::after{
content:"";
animation:dots 1.4s infinite steps(4);
}

@keyframes dots{
0%{content:"";}
25%{content:".";}
50%{content:"..";}
75%{content:"...";}
100%{content:"";}
}

</style>
</head>

<body>

<div class="loader-box">

  <div class="logo-container">
    <div class="logo-glow"></div>
    <div class="loader-ring"></div>
    <div class="logo"></div>
  </div>



</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get("modal") === "true") {
    document.body.style.background = "rgba(0,0,0,0.25)";
}
</script>

</body>
</html>>
