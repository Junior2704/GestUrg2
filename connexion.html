<!-- accueil.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1565c0">
  <meta charset="UTF-8">
  <title>Connexion</title>
        <link rel="icon" type="image/jpeg" href="logog.png">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  
  // --- Config Firebase ---
  const firebaseConfig = {
    apiKey: "AIzaSyBKp5-7NNy0Gyl0tNbDgD-BxucYdg8ArWo",
    authDomain: "urgences-a8ed4.firebaseapp.com",
    projectId: "urgences-a8ed4"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
window.allerAdmin = async function () {
    window.location.href = "connexionadmin.html";
  }
  // --- Fonction de connexion ---
  window.seConnecter = async function () {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const message = document.getElementById("message");
    message.textContent = "";
    message.style.color = "red";

    try {
      // 🔐 Connexion utilisateur
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;

      // 🔎 Vérifie dans Firestore si "doitChangerMDP" est vrai
      const ref = doc(db, "medecins", user.uid);
      const snap = await getDoc(ref);
if (snap.exists()) {
  const data = snap.data();

  // 🔴 Vérifie si le compte est marqué pour suppression
  if (data.supprime === true) {
    window.location.href = "suppressioncompte.html";
    return;
  }

  // 🔐 Vérifie si l'utilisateur doit changer son mot de passe
  if (data.doitChangerMDP === true) {
    window.location.href = "changer_mot_passe.html";
    return;
  }
}


    // ➡️ Sinon, redirige vers la page principale
// (mobile → urgences_mobile, ordinateur → urgences)
function isMobileDevice() {
  return /Android|iPhone|iPad|iPod|webOS|BlackBerry|Windows Phone|Mobile/i.test(navigator.userAgent)
      || (window.innerWidth < 850);
}

if (isMobileDevice()) {
  window.location.href = `fiche-mobile.html?uid=${user.uid}`;
} else {
  window.location.href = `shell.html`;
}


    } catch (error) {
  let errorMsg = "❌ Erreur de connexion. Veuillez réessayer.";

  switch (error.message) {
    case "Firebase: Error (auth/invalid-email).":
      errorMsg = "⚠️ Email invalide. Vérifiez l'adresse saisie.";
      break;
    case "Firebase: Error (auth/user-disabled).":
      errorMsg = "🚫 Ce compte a été désactivé. Contactez un administrateur.";
      break;
    case "Firebase: Error (auth/user-not-found).":
      errorMsg = "❌ Aucun compte trouvé avec cet email.";
      break;
    case "Firebase: Error (auth/invalid-credential).":
      errorMsg = "🔑 Couple email/mot de passe incorrect.";
      break;
    case "Firebase: Error (auth/missing-password).":
      errorMsg = "⚠️ Merci de saisir un mot de passe.";
      break;
    case "Firebase: Error (auth/too-many-requests).":
      errorMsg = "🚨 Vous avez tenté de vous connecté trop de fois avec un mot de passe éronné. Merci de réessayer plus tard";
      break;
    case "Firebase: Error (auth/network-request-failed).":
      errorMsg = "📶 Problème de connexion réseau. Vérifiez votre connexion Internet.";
      break;
    default:
      errorMsg = "❌ Une erreur est survenue : " + error.message;
      break;
  }

  message.textContent = errorMsg;
}
  };
  async function checkFonctionnement() {
  try {
    const ref = doc(db, "référentiels", "fonctionnement");
    const snap = await getDoc(ref);

    console.log("🔥 Firestore snap exists:", snap.exists());
    console.log("🔥 Firestore data:", snap.data());

    if (!snap.exists()) {
      showSystemModal("❌ Erreur système", "Document introuvable");
      return false;
    }

    const data = snap.data();

    // ⚠️ DEBUG IMPORTANT
    const rawMode = data.mode ?? data.Mode ?? data.etat ?? data.status;
    console.log("🔥 MODE BRUT =", rawMode);

    const mode = String(rawMode || "").trim().toLowerCase();

    console.log("🔥 MODE NORMALISÉ =", mode);

    if (mode === "normal") return true;

    if (mode === "maintenance") {
      showSystemModal(
        "🚧 Maintenance en cours",
        "Le système est en maintenance. Merci de réessayer plus tard."
      );
      return false;
    }

    if (mode === "erreur") {
      showSystemModal(
        "❌ Erreur système",
        "Accès bloqué pour cause d’erreur système."
      );
      return false;
    }

    showSystemModal(
      "⚠️ Mode inconnu",
      "Valeur reçue : " + mode
    );

    return false;

  } catch (e) {
    console.error("🔥 FIRESTORE ERROR:", e);
    showSystemModal("❌ Erreur Firestore", e.message);
    return false;
  }
}
window.showSystemModal = function(title, text) {
  const modal = document.getElementById("systemModal");

  document.getElementById("systemModalTitle").textContent = title;
  document.getElementById("systemModalText").textContent = text;

  const icon = document.getElementById("systemModalIcon");

if (title.includes("Maintenance")) {
  icon.innerHTML = '<img src="maintenance.gif" alt="Maintenance" style="width:24px; height:24px;">';
}  else if (title.includes("Erreur")) icon.textContent = "❌";
  else icon.textContent = "⚠️";

  // 🔒 BLOQUAGE TOTAL INTERFACE
  document.body.classList.add("locked");

  modal.style.display = "flex";
};
window.addEventListener("DOMContentLoaded", async () => {
  const ok = await checkFonctionnement();

  // si pas OK → on bloque les boutons
  if (!ok) {
    document.querySelectorAll("button").forEach(btn => {
      if (btn.textContent.includes("Se connecter")) {
        btn.disabled = true;
        btn.style.opacity = "0.5";
        btn.style.cursor = "not-allowed";
      }
    });
  }
});
</script>

  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f4f4f4;
    }
    #loginBox {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      text-align: center;
      margin-top: 60px;
      width: 300px;
    }
    input {
      padding: 10px;
      width: 100%;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

  /* 🎨 Effet au survol pour tous les boutons */
  button:hover {
    opacity: 0.85;
    transform: scale(1.05);
    transition: all 0.2s ease-in-out;
  }

  /* 🧠 Optionnel : effet au clic pour plus de réalisme */
  button:active {
    transform: scale(0.98);
  }

    #message {
      color: red;
      margin-top: 10px;
    }
    img {
      margin-top: 15px;
    }
   #shell-topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 20px 6px 16px; /* padding à droite augmenté */
  background: #ffffff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  width: 100%;
  position: fixed;
  top: 0;
  left: 0;
  height: 48px;
  font-family: Inter, Arial, sans-serif;
  z-index: 1000;
  box-sizing: border-box; /* pour inclure le padding dans la largeur */
}

#topbar-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  margin-right: 8px; /* un petit décalage supplémentaire pour l'ascenseur */
}

#window-controls {
  display: flex;
  gap: 6px;
  margin-bottom: 4px; /* un peu plus d’espace entre les boutons et l’heure */
}

#datetime {
  font-weight: 500;
  font-size: 14px;
  color: #374151;
  line-height: 1.2; /* pour mieux séparer du haut */
}


#topbar-left {
  font-weight: bold;
  font-size: 20px;
}

#topbar-center {
  font-size: 16px;
  font-weight: 500;
}



#window-controls button {
  background: #e6f0fc;
  border: none;
  border-radius: 6px;
  width: 28px;
  height: 28px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

#window-controls button:hover {
  background: #0078d4;
  color: white;
}

#window-controls button.close:hover {
  background: #e74c3c;
}
body.locked {
  overflow: hidden !important;
  pointer-events: none !important;
}


  </style>
</head>
<body>
<div id="shell-topbar">
  <!-- Titre à gauche -->
  <div id="topbar-left">
    🚑 GestUrg2
  </div>

  <!-- Texte central -->
  <div id="topbar-center">
    Connexion
  </div>

  <!-- Heure + boutons Electron à droite -->
  <div id="topbar-right">
    
    <span id="datetime"></span>
  </div>
</div>


<div id="loginBox" style="text-align:center; background:white; padding:25px; border-radius:12px; width:350px; margin:auto; box-shadow:0 0 10px rgba(0,0,0,0.1);">
  <h2>🔐 Connexion</h2>

  <input type="email" id="email" placeholder="Email" style="width:90%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:8px;">
  <input type="password" id="password" placeholder="Mot de passe" style="width:90%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:8px;">

  <!-- ✅ Bouton principal (utilisateur) -->
  <button onclick="seConnecter()" 
          style="background:#0078d4;color:white;border:none;padding:10px 20px;margin-top:10px;
                 border-radius:8px;cursor:pointer;width:90%;font-size:16px;">
    👤 Se connecter
  </button>


  <!-- ⚙️ Bouton secondaire (admin) -->
  <button onclick="allerAdmin()" 
          style="background:#ff9800;color:white;border:none;padding:10px 20px;margin-top:10px;
                 border-radius:8px;cursor:pointer;width:90%;font-size:16px;">
    🛠️ Portail Admin
  </button>

  <div id="message" style="margin-top:10px;color:red;"></div>
  <img src="logo.png" alt="Logo" width="200" style="margin-top:15px;">
</div>
<div id="qrModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
                        background:rgba(0,0,0,0.7); justify-content:center; align-items:center; z-index:2000;">
  <div style="background:white; padding:20px; border-radius:12px; text-align:center; width:300px; position:relative;">
    <h3>📷 Scannez avec votre téléphone</h3>
    <div id="qrCodeContainer" style="margin:15px;"></div>
    <p id="qrStatus">Génération du QR...</p>
    <button onclick="closeQRLogin()" style="margin-top:10px;padding:8px 15px;border:none;background:#e74c3c;color:white;border-radius:6px;cursor:pointer;">
      ❌ Fermer
    </button>
  </div>
</div>
<div id="systemModal" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  background:rgba(0,0,0,0.85);
  z-index:999999;
  justify-content:center;
  align-items:center;
  backdrop-filter: blur(6px);
">

  <div style="
    background:white;
    padding:30px;
    border-radius:14px;
    width:360px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
    font-family:sans-serif;
  ">

    <div id="systemModalIcon" style="font-size:50px; margin-bottom:10px;">⚠️</div>

    <h2 id="systemModalTitle" style="margin:0;"></h2>

    <p id="systemModalText" style="margin-top:10px; font-size:14px;"></p>

  </div>
</div>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js')
    .then(() => console.log("Service Worker enregistré !"));
}
</script>

<script>
function updateDateTime() {
  const now = new Date();
  const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
  const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  document.getElementById('datetime').textContent = now.toLocaleDateString('fr-FR', options) + ' ' + time;
}

// Mise à jour toutes les secondes
setInterval(updateDateTime, 1000);
updateDateTime();


</script>


</body>
</html>
