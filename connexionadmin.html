<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion Administrateur</title>
  <link rel="icon" type="image/jpeg" href="logo.png" />

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // --- Configuration Firebase ---
    const firebaseConfig = {
      apiKey: "AIzaSyBKp5-7NNy0Gyl0tNbDgD-BxucYdg8ArWo",
      authDomain: "urgences-a8ed4.firebaseapp.com",
      projectId: "urgences-a8ed4"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- Connexion administrateur ---
    window.connexionAdmin = async function () {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const msg = document.getElementById("message");
      msg.textContent = "";
      msg.style.color = "red";

      if (!email || !password) {
        msg.textContent = "Veuillez saisir votre email et mot de passe.";
        return;
      }

      try {
        // 🔐 Authentification Firebase
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // 🔎 Vérifie les droits dans Firestore
        const ref = doc(db, "medecins", user.uid);
        const snap = await getDoc(ref);

        if (!snap.exists()) {
          msg.textContent = "Compte introuvable dans la base de données.";
          return;
        }

        const data = snap.data();
        const pages = data.pages || {};

        if (pages.admin === true) {
          // ✅ Accès autorisé
          msg.style.color = "green";
          msg.textContent = "Connexion réussie ! Redirection...";
          sessionStorage.setItem("adminUID", user.uid);

          setTimeout(() => {
            window.location.href = "parametres.html";
          }, 1000);
        } else {
          // 🚫 Pas d'accès admin
          msg.textContent = "🚫 Accès refusé : ce compte n'a pas les droits administrateur.";
        }

      }  catch (error) {
  let errorMsg = "❌ Erreur de connexion. Veuillez réessayer.";

  switch (error.message) {
    case "Firebase: Error (auth/invalid-email).":
      errorMsg = "⚠️ Email invalide. Vérifiez l'adresse saisie.";
      break;
    case "Firebase: Error (auth/user-disabled).":
      errorMsg = "🚫 Ce compte a été désactivé. Contactez un administrateur.";
      break;
    case "Firebase: Error (auth/user-not-found).":
      errorMsg = "❌ Aucun compte trouvé avec cet email.";
      break;
    case "Firebase: Error (auth/invalid-credential).":
      errorMsg = "🔑 Couple email/mot de passe incorrect.";
      break;
    case "Firebase: Error (auth/missing-password).":
      errorMsg = "⚠️ Merci de saisir un mot de passe.";
      break;
    case "Firebase: Error (auth/too-many-requests).":
      errorMsg = "🚨 Vous avez tenté de vous connecté trop de fois avec un mot de passe éronné. Merci de réessayer plus tard";
      break;
    case "Firebase: Error (auth/network-request-failed).":
      errorMsg = "📶 Problème de connexion réseau. Vérifiez votre connexion Internet.";
      break;
    default:
      errorMsg = "❌ Une erreur est survenue : " + error.message;
      break;
  }

  message.textContent = errorMsg;
}
    };
  </script>

  <style>

    }

.btn-id-v:hover {

  </style>
</head>

<body>

    🚑 GestUrg2
  </div>

  <!-- Texte central -->

</div>

    <h2>🔐 Connexion Administrateur</h2>
    <input type="email" id="email" placeholder="Email administrateur" />

    <button class="btn-id"onclick="connexionAdmin()">Se connecter</button>
    <br><br>
<button onclick="window.location.href='connexion.html'" 
        class="btn-id btn-id-c">
  ❌ Annuler
</button>
        


  </div>
  <script>
function updateDateTime() {
  const now = new Date();
  const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
  const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  document.getElementById('datetime').textContent = now.toLocaleDateString('fr-FR', options) + ' ' + time;
}

// Mise à jour toutes les secondes
setInterval(updateDateTime, 1000);
updateDateTime();


</script>
</body>
