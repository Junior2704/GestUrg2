<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { 
  getFirestore,
  doc,
  getDoc,
  setDoc,
  updateDoc,
  addDoc,
  collection,
  getDocs,
  query,
  where,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyBKp5-7NNy0Gyl0tNbDgD-BxucYdg8ArWo",
    authDomain: "urgences-a8ed4.firebaseapp.com",
    projectId: "urgences-a8ed4"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

   let medecinNom = "";
  let medecinSpecialite = "";
  let medecinLieu = "";
  // 📌 RÉCUP PATIENT (V10)
const urlParams = new URLSearchParams(window.location.search);
const patientId = urlParams.get("id");

if (patientId) {
  const docSnap = await getDoc(doc(db, "patients", patientId));

  if (docSnap.exists()) {
    const data = docSnap.data();

    document.getElementById("patient-first-name").value = data.prenom || "";
    document.getElementById("patient-last-name").value = data.nom || "";
    document.getElementById("sexe").value = data.sexe || "M";

    if (data.dateNaissance?.seconds) {
      document.getElementById("patient-birthdate").valueAsDate =
        new Date(data.dateNaissance.seconds * 1000);
    }

    
  }
}
if (!patientId) {
  console.error("ID patient manquant");
}
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    return;
  } else {
    try {
      window.afficherLoader();
      const docRef = doc(db, "medecins", user.uid);
      const docSnap = await getDoc(docRef);
      if (docSnap.exists()) {
        const data = docSnap.data();
        medecinNom = data.nom || "";
        medecinSpecialite = data.specialite || "";
        medecinLieu = data.lieu || "";

        // Met à jour aussi les variables globales sur window
        window.medecinNom = medecinNom;
        window.medecinSpecialite = medecinSpecialite;
        window.medecinLieu = medecinLieu;

        // Mise à jour des éléments HTML si présents
        const nomElem = document.getElementById("nom-medecin");
        if (nomElem) nomElem.textContent = medecinNom;

        const specElem = document.getElementById("specialite");
        if (specElem) specElem.textContent = medecinSpecialite;

        const lieuElem = document.getElementById("lieu-medecin");
        if (lieuElem) lieuElem.textContent = medecinLieu;

        // --- Vérification d'accès à la page ---
        const pages = data.pages || {};
        const currentPath = window.location.pathname;
        const currentPage = currentPath.substring(currentPath.lastIndexOf("/") + 1).replace(".html", "");
        const pageMapping = { "prescriptionexamensf": "prescriptionexamens" };
        const pageKey = pageMapping[currentPage] || currentPage;

        if (!pages[pageKey]) {
const modal = document.getElementById("modal-no-access");
          if (modal) masquerLoader();
          modal.style.display = "flex";       
          console.warn("Accès refusé à", currentPage);
        }
      } else {
        // Document inexistant — redirection
        alert("Utilisateur non trouvé, veuillez vous reconnecter.");
        return;
      }
      masquerLoader();
    } catch (error) {
      const modal = document.getElementById("modal-error");
          if (modal) masquerLoader();
          modal.style.display = "flex"; 
      console.error("Erreur chargement médecin :", error);
      
    }
  }
});
  window.toggleSublist = function(listId){
  const sublist = document.getElementById(listId);
  sublist.style.display = sublist.style.display === "block" ? "none" : "block";
}

function toggleExam(checkbox){
  const value = checkbox.value;
  const prescriptionList = document.getElementById("prescription-list");
  if(checkbox.checked){
    const div = document.createElement("div");
    div.className = "prescription-item";
    div.dataset.exam = value;
    div.innerHTML = `${value} <button class="btn-delete" onclick="removeExam(this)">✖</button>`;
    prescriptionList.appendChild(div);
  } else {
    Array.from(prescriptionList.children).forEach(child=>{
      if(child.dataset.exam === value) prescriptionList.removeChild(child);
    });
  }
  checkIfPrescriptionsRemain();
 
}
  window.toggleExam=toggleExam;
window.afficherLoader = function() {
  let loader = document.getElementById("loadingScreen");
  
  if (!loader) {
    loader = document.createElement("iframe");
    loader.id = "loadingScreen";
    loader.src = "loader.html?modal=true"; 
    loader.style.position = "fixed";
    loader.style.top = "0";
    loader.style.left = "0";
    loader.style.width = "100%";
    loader.style.height = "100%";
    loader.style.border = "none";
    loader.style.zIndex = "9999";
    loader.style.background = "transparent";
    loader.style.pointerEvents = "none"; 
    document.body.appendChild(loader);
  }

  loader.style.display = "block";
  loader.style.opacity = "1";
};

// --- Masque l’écran de chargement ---
window.masquerLoader = function() {
  const loader = document.getElementById("loadingScreen");
  if (loader) {
    loader.style.transition = "opacity 0.3s ease";
    loader.style.opacity = "0";
    setTimeout(() => {
      loader.style.display = "none";
    }, 300); // délai pour l’animation
  }
};
function construireORD() {

  // 🔥 au lieu du textarea → examens
  const prescriptionText = getExamensSelectionnes()
    .map(e => `${e.type}${e.commentaire ? " - " + e.commentaire : ""}`)
    .join("\n");

  const firstName = document.getElementById("patient-first-name")?.value.trim() || "";
  const lastName = document.getElementById("patient-last-name")?.value.trim() || "";
  const age = document.getElementById("patient-age")?.value.trim() || "";

  const sexe = document.getElementById("sexe")?.value || "";

  const lignes = prescriptionText.split("\n");

  const contenu = [];

  lignes.forEach(ligne => {

    if (ligne.trim() === "---") {
      contenu.push({ type: "separator" });

    } else if (ligne.trim().startsWith("**") && ligne.trim().endsWith("**")) {
      contenu.push({
        type: "bold",
        value: ligne.replace(/\*\*/g, "")
      });

    } else {
      contenu.push({
        type: "text",
        value: ligne
      });
    }

    contenu.push({ type: "newline" });

  });

  return {
    version: "1.0",
    type: "ordonnance",

    titre: "Prescription d'examens",

    date: new Date().toLocaleDateString("fr-FR"),
    lieu: window.medecinLieu || "Lyon",

    patient: {
      nom: lastName,
      prenom: firstName,
      age: age,
      sexe: sexe
    },

    medecin: {
      nom: window.medecinNom || "Dr Non renseigné",
      specialite: window.medecinSpecialite || ""
    },

    contenu: contenu,

    signature: true
  };
}
function getExamensSelectionnes() {
  const examens = [];

  document.querySelectorAll("#prescription-list .prescription-item")
    .forEach(item => {
      examens.push({
        type: item.dataset.exam,
        commentaire: "" // tu peux améliorer après
      });
    });

  return examens;
}
function imprimer() {
    // Vérifie que l'ID du document existe
    if (!window.pdfIdExistante) {
        afficherBulle("❌ Aucun document disponible pour impression", "alerte");
        return;
    }

    // Envoie le message au parent pour ouvrir un nouvel onglet
    window.parent.postMessage(
        {
            type: "OPEN_TAB",
            title: "Certificat médical",
            url: `viewer.html?docId=${window.pdfIdExistante}` // URL avec l'ID existant
        },
        "*"
    );
}

window.imprimer=imprimer;
// 💾 ENREGISTREMENT FIRESTORE (V10)
window.validerPrescription = async function (){

  // 🔥 on transforme les examens en texte (comme avant)
  const prescriptionText = getExamensSelectionnes()
    .map(e => `${e.type}${e.commentaire ? " - " + e.commentaire : ""}`)
    .join("\n");

  if (!prescriptionText) {
    afficherBulle("⛔ Aucun examen sélectionné !", "alerte");
    return;
  }

  document.getElementById("btnValiderPrescription").style.display = "none";
  document.getElementById("postValidationActions").style.display = "flex";

  // 🔹 Création du .ord EXACTEMENT comme toi
  const ord = construireORD();

  const patientId = getIdFromURL();

  if (patientId) {

    try {

      const idUnique = Math.random().toString(36).substring(2, 10);
      const dateFormatted = formatDate(new Date());

      window.pdfIdExistante = idUnique;

      await setDoc(
        doc(db, "documents", idUnique),
        {
          patientId: patientId,
          dateCreation: dateFormatted,

          type: "Prescription d'examens",

          // 🔥 EXACTEMENT comme avant (texte)
          contenu: prescriptionText,

          // 🔥 EXACTEMENT comme avant (.ord)
          ord: ord,

        }
      );

      console.log("✅ Prescription enregistrée avec ID unique :", idUnique);
      afficherBulle("✅ Prescription enregistrée !", "success");

    } catch (err) {
      console.error(err);
    }

  }

}
async function genererPrescription(telecharger = false) {

  try {

    // ==============================
    // 🔹 1. Récupération données UI
    // ==============================

    const prescriptionText = document.getElementById("prescription-text")?.value.trim() || "";

    const firstName = document.getElementById("patient-first-name")?.value.trim() || "";
    const lastName = document.getElementById("patient-last-name")?.value.trim() || "";
    const age = document.getElementById("patient-age")?.value.trim() || "";
    const sexe = document.getElementById("sexe")?.value || "";

    const date = new Date().toLocaleDateString("fr-FR");
    const lieu = window.medecinLieu || "Lyon";

    // ==============================
    // 🔹 2. Conversion TEXTE → .ord
    // ==============================

    const lignes = prescriptionText.split("\n");

    const contenu = [];

    lignes.forEach(ligne => {

      if (ligne.trim() === "---") {
        contenu.push({ type: "separator" });

      } else if (ligne.trim().startsWith("**") && ligne.trim().endsWith("**")) {
        contenu.push({
          type: "bold",
          value: ligne.replace(/\*\*/g, "")
        });

      } else {
        contenu.push({
          type: "text",
          value: ligne
        });
      }

      contenu.push({ type: "newline" });

    });

    // ==============================
    // 🔹 3. Création objet .ord
    // ==============================

    const ord = {

      version: "1.0",
      type: "ordonnance",

      titre: "Ordonnance médicale",

      date: date,
      lieu: lieu,

      patient: {
        nom: lastName,
        prenom: firstName,
        age: age,
        sexe: sexe
      },

      medecin: {
        nom: window.medecinNom || "Dr Non renseigné",
        specialite: window.medecinSpecialite || ""
      },

      contenu: contenu,

      signature: true,
      logo: "logo.png"

    };

    // ==============================
    // 🔹 4. Génération PDF via ton moteur
    // ==============================

    if (telecharger) {
      // téléchargement direct
      await ordToPDF(ord);
      return "";
    }

    // ==============================
    // 🔹 5. Génération BASE64 (Firestore)
    // ==============================

    const html = generateHTML(ord);

    const container = document.createElement("div");
    container.innerHTML = html;

    const pdfBlob = await html2pdf()
      .set({
        margin: 0,
        filename: `${ord.titre}.pdf`,
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
      })
      .from(container)
      .outputPdf('blob');

    // conversion blob → base64
    const base64 = await new Promise((resolve) => {
      const reader = new FileReader();
      reader.readAsDataURL(pdfBlob);
      reader.onloadend = () => resolve(reader.result.split(",")[1]);
    });

    window.pdfBase64 = base64;

    return base64;

  } catch (error) {
    console.error("❌ Erreur génération PDF :", error);
    return "";
  }
}

window.genererPrescription=genererPrescription;


</script>
