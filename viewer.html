<!DOCTYPE html>
<html lang="fr">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="ordToPdf.js"></script>
<meta charset="UTF-8">
<title>Document PDF</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Firebase (AUTONOME) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    background: #1e293b;
    color: white;
}

header img {
    height: 36px;
}

header span {
    font-size: 16px;
    font-weight: bold;
}

#pdfWrapper {
    height: 100% ;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}
</style>
</head>
<body>



<div id="pdfWrapper">
    <iframe id="pdfFrame"></iframe>
</div>

<script>
/* ===============================
   🔥 CONFIG FIREBASE (À REMPLACER)
   =============================== */
const firebaseConfig = {
    apiKey: "AIzaSyBKp5-7NNy0Gyl0tNbDgD-BxucYdg8ArWo",
    authDomain: "urgences-a8ed4.firebaseapp.com",
    projectId: "urgences-a8ed4",
    storageBucket: "urgences-a8ed4.appspot.com",
    messagingSenderId: "392921498200",
    appId: "1:392921498200:web:7ccce767332c67c697c02d",
    measurementId: "G-C74MK2KYDL"
}; 	

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

window.viewer= async function () {
/* ===============================
   📄 RÉCUPÉRATION docId
   =============================== */
const params = new URLSearchParams(window.location.search);
const docId = params.get("docId");
const fileUrl = params.get("file");


// =============================
// CAS 1 : URL DIRECT
// =============================
if (fileUrl) {
    document.getElementById("pdfFrame").src = decodeURIComponent(fileUrl);
}

// =============================
// CAS 2 : FIRESTORE v10
// =============================
else if (docId) {

    const ref = doc(db, "documents", docId);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
        document.body.innerHTML = "<h2 style='padding:20px'>Document introuvable</h2>";
    } else {

        const data = snap.data();

        // =========================
        // 🔥 CAS ORD (ORDONNANCE)
        // =========================
        if (data.ord) {

            if (!window.ordToPDF) {
                document.body.innerHTML = "<h2 style='padding:20px'>Module ordonnance non chargé</h2>";
            } else {
                ordToPDF(data.ord);
                document.body.innerHTML = "<h2 style='padding:20px'>Génération de l'ordonnance...</h2>";
            }

        }

        // =========================
        // 📄 CAS PDF BASE64
        // =========================
        else if (data.pdfBase64) {

            const blob = b64toBlob(data.pdfBase64, "application/pdf");
            const url = URL.createObjectURL(blob);
            document.getElementById("pdfFrame").src = url;

        }

        // =========================
        // ❌ CAS VIDE
        // =========================
        else {
            document.body.innerHTML = "<h2 style='padding:20px'>PDF indisponible</h2>";
        }
    }
}

else {
    document.body.innerHTML = "<h2 style='padding:20px'>Aucun document fourni</h2>";
}
}

/* ===============================
   🔁 BASE64 → BLOB
   =============================== */
function b64toBlob(b64, type) {
    const bytes = atob(b64);
    const arr = new Uint8Array(bytes.length);
    for (let i = 0; i < bytes.length; i++) {
        arr[i] = bytes.charCodeAt(i);
    }
    return new Blob([arr], { type });
}
viewer();

</script>

</body>
</html>
