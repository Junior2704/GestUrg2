function showSpinner() {

   window.loadPatients=async function loadPatients() {
  const snapshot = await getDocs(collection(db, "patients"));
  const result = [];

  for (const docSnap of snapshot.docs) {
    const data = docSnap.data();
    const hospId = data.hospitalisationActiveId;

    if (!hospId) continue;

    const hospRef = doc(db, "hospitalisations", hospId);
    const hospSnap = await getDoc(hospRef);
    if (!hospSnap.exists()) continue;

    const hosp = hospSnap.data();

    const examensNonRealises = (hosp.examens || [])
      .map((ex, i) => ({ ...ex, examIndex: i }))
      .filter(ex => !ex.realise);

    if (examensNonRealises.length === 0) continue;

    result.push({
      patientId: docSnap.id,
      nom: data.nom,
      prenom: data.prenom,
      dateNaissance: data.dateNaissance,
      position: data.position,
      hospitalisationId: hospId,
      examensNonRealises
    });
  }

  return result;
}


    function formatDateHeure(dateStr) {
  if (!dateStr || dateStr === "?") return "?";

  // dateStr attendu au format "DD/MM/YYYY HH:MM:SS"
  const [datePart, timePart] = dateStr.split(" ");
  if (!datePart || !timePart) return "?";

  const [day, month, year] = datePart.split("/").map(Number);
  const [hour, minute, second] = timePart.split(":").map(Number);

  // Création de la date valide
  const dateObj = new Date(year, month - 1, day, hour, minute, second);
  if (isNaN(dateObj)) return "?";

  // Formatage en "DD/MM/YYYY HH:MM"
  const dd = String(dateObj.getDate()).padStart(2, "0");
  const mm = String(dateObj.getMonth() + 1).padStart(2, "0");
  const yyyy = dateObj.getFullYear();
  const hh = String(dateObj.getHours()).padStart(2, "0");
  const min = String(dateObj.getMinutes()).padStart(2, "0");

  return `${dd}/${mm}/${yyyy} ${hh}:${min}`;
}

    function calculerAge(dateNaissance) {
      const d = new Date(dateNaissance);
      const today = new Date();
      let age = today.getFullYear() - d.getFullYear();
      const m = today.getMonth() - d.getMonth();
      if (m < 0 || (m === 0 && today.getDate() < d.getDate())) age--;
      return age;
    }

    function renderTable(patients) {
      tableBody.innerHTML = "";
      patients.forEach(p => {
        const examsList = p.examensNonRealises.map(e => e.type || "Examen").join(", ");
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${p.nom}</td>
          <td>${p.prenom}</td>
          <td>${formaterDate(p.dateNaissance)}</td>
          <td>${examsList}</td>
          <td>${p.position || "N/A"}</td>`;
        tr.ondblclick = () => showDetails(p);
        tableBody.appendChild(tr);
      });
    }

window.showDetails=async(patient)=> {
  detailPanel.style.display = "flex";
showSpinner();


  const hospRef = doc(db, "hospitalisations", patient.hospitalisationId);

  if (!hospSnap.exists()) {
    alert("Hospitalisation introuvable");

  }

  const hospData = hospSnap.data();
  const examens = hospData.examens || [];
console.log("Données examens brutes :", examens);
  // 🔴 Examens NON réalisés
  const examensNonRealisesHTML = examens
    .map((e, i) => ({ ...e, examIndex: i }))

  // 🟢 Examens DÉJÀ réalisés

chargerHistoriqueComplet(patient.patientId).finally(hideSpinner);

  // --- 🫧 Notifications bulles ---
  function afficherBulle(message, type) {
    const cont = document.getElementById("bubble-container") || (() => {
      const c = document.createElement("div");
      c.id = "bubble-container";
      document.body.appendChild(c);
      return c;
    })();

    const bubble = document.createElement("div");
    bubble.className = `bubble ${type}`;
    bubble.textContent = message;
    cont.appendChild(bubble);
    setTimeout(() => bubble.remove(), 5500);
  }

 async function chargerHistoriqueComplet(patientId) {
  const contenu = document.getElementById("hospitalisationsContent");
  if (!contenu) {
    console.error("❌ #hospitalisationsContent introuvable");
    return;
  }

  contenu.innerHTML = "<p>⏳ Chargement de l'historique...</p>";

  try {
    const q = query(
      collection(db, "hospitalisations"),
      where("patientId", "==", patientId)
    );

    const snap = await getDocs(q);

    if (snap.empty) {
      contenu.innerHTML = "<p>Aucune hospitalisation trouvée.</p>";
      return;
    }

    // 🔽 on garde uniquement les hospitalisations terminées
    const hospitalisations = snap.docs
      .map(d => ({ id: d.id, ...d.data() }))
      .filter(h => h.dateFin); // exclut l'active
      // .sort((a, b) => new Date(b.dateDebut) - new Date(a.dateDebut)); // optionnel

    if (hospitalisations.length === 0) {
      contenu.innerHTML = "<p>Aucune hospitalisation antérieure.</p>";
      return;
    }

    // 🔄 plus récentes d'abord
    hospitalisations.sort(
      (a, b) => new Date(b.dateDebut) - new Date(a.dateDebut)
    );

    contenu.innerHTML = "";

    hospitalisations.forEach(hospi => {
      const card = document.createElement("div");
      card.className = "card";

      const dossier = hospi.dossierMedical || {};
      const sortie = hospi.sortie || null;

      const parts = [];

      parts.push(`<div><strong>📅 Admission :</strong> ${hospi.dateDebut || "—"}</div>`);
      parts.push(`<div><strong>📅 Sortie :</strong> ${hospi.dateFin || "—"}</div>`);
      parts.push(`<div><strong>Motif :</strong> ${hospi.motif || "—"}</div>`);
      parts.push(`<div><strong>Gravité :</strong> ${hospi.gravite || "—"}</div>`);

      parts.push(`<hr>`);

      parts.push(`<h3>📋 Dossier médical</h3>`);
      parts.push(`<p><strong>Questionnaire IAO :</strong><br>${dossier.questionnaire || "—"}</p>`);
      parts.push(`<p><strong>Antécédents :</strong><br>${dossier.antecedents || "—"}</p>`);
      parts.push(`<p><strong>Traitements :</strong><br>${dossier.traitements || "—"}</p>`);
      parts.push(`<p><strong>Histoire de la maladie :</strong><br>${dossier.histoire || "—"}</p>`);
      parts.push(`<p><strong>CR Auscultation :</strong><br>${dossier.auscultation || "—"}</p>`);

      parts.push(`<hr>`);

      parts.push(`<h3>📈 Évolution aux urgences</h3>`);
      parts.push(`<p style="white-space:pre-wrap">${hospi.evolution || "—"}</p>`);

      if (sortie) {
        parts.push(`<hr>`);
        parts.push(`<h3>🚪 Sortie</h3>`);
        parts.push(`<p><strong>Type :</strong> ${sortie.type || "—"}</p>`);

        if (sortie.serviceHospitalisation)
          parts.push(`<p><strong>🏥 Service :</strong> ${sortie.serviceHospitalisation}</p>`);

        if (sortie.destinationTransfert)
          parts.push(`<p><strong>↔️ Transfert :</strong> ${sortie.destinationTransfert}</p>`);

        if (sortie.avisSpecialiste)
          parts.push(`<p><strong>👩‍⚕️ Avis spécialiste :</strong> ${sortie.avisSpecialiste}</p>`);

        if (Array.isArray(sortie.options) && sortie.options.length > 0)
          parts.push(`<p><strong>📋 Options :</strong> ${sortie.options.join(", ")}</p>`);

        if (sortie.traitementSortie)
          parts.push(`<p><strong>💊 Traitement de sortie :</strong><br>${sortie.traitementSortie}</p>`);

        if (sortie.autreSortieTexte)
          parts.push(`<p><strong>🔤 Autre :</strong> ${sortie.autreSortieTexte}</p>`);
      }

      if (hospi.rapport) {
        parts.push(`<hr>`);
        parts.push(`<h3>📄 Rapport d'hospitalisation</h3>`);
        parts.push(`<p>${hospi.rapport}</p>`);
      }

      card.innerHTML = parts.join("\n");
      contenu.appendChild(card);
    });

  } catch (err) {
    console.error("❌ Erreur chargement historique :", err);
    contenu.innerHTML = "<p>❌ Erreur lors du chargement de l'historique.</p>";
  }
}

function formatDateHeure(dateStr) {
  if (!dateStr || dateStr === "?") return "?";

  // dateStr attendu au format "DD/MM/YYYY HH:MM:SS"
  const [datePart, timePart] = dateStr.split(" ");
  if (!datePart || !timePart) return "?";

  const [day, month, year] = datePart.split("/").map(Number);
  const [hour, minute, second] = timePart.split(":").map(Number);

  // Création de la date valide
  const dateObj = new Date(year, month - 1, day, hour, minute, second);
  if (isNaN(dateObj)) return "?";

  // Formatage en "DD/MM/YYYY HH:MM"
  const dd = String(dateObj.getDate()).padStart(2, "0");
  const mm = String(dateObj.getMonth() + 1).padStart(2, "0");
  const yyyy = dateObj.getFullYear();
  const hh = String(dateObj.getHours()).padStart(2, "0");
  const min = String(dateObj.getMinutes()).padStart(2, "0");

  return `${dd}/${mm}/${yyyy} ${hh}:${min}`;
}
document.addEventListener("DOMContentLoaded", () => {

  document.querySelectorAll(".menu-toggle").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();

      const wrapper = btn.closest(".menu-wrapper");
      if (!wrapper) return;

      // Ferme les autres menus
      document.querySelectorAll(".menu-wrapper.open").forEach(w => {
        if (w !== wrapper) w.classList.remove("open");
      });

      // Toggle celui-ci
      wrapper.classList.toggle("open");
    });
  });

  // clic ailleurs → fermeture
  document.addEventListener("click", () => {
    document.querySelectorAll(".menu-wrapper.open")
      .forEach(w => w.classList.remove("open"));
  });

});

let appLocked = false;

window.addEventListener("message", (event) => {

  if (!event.data) return;

  if (event.data.type === "APP_LOCK") {
    appLocked = true;

    // Stopper timers éventuels si besoin
    document.body.style.filter = "grayscale(0.8)";
  }

  if (event.data.type === "APP_UNLOCK") {
    appLocked = false;
    document.body.style.filter = "none";
  }
});
function renderTable(patients) {
  const tableBody = document.getElementById("patientsBody");
  tableBody.innerHTML = "";
  patients.forEach(p => {
    const examsList = p.examensNonRealises.map(e => e.type || "Examen").join(", ");
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${p.nom}</td>
      <td>${p.prenom}</td>
      <td>${formaterDate(p.dateNaissance)}</td>
      <td>${examsList}</td>
      <td>${p.position || "N/A"}</td>`;
    tr.ondblclick = () => showDetails(p);
    tableBody.appendChild(tr);
  });
}

      const d = new Date(dateStr);
