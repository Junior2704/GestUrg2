
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chargement GestUrg2</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #ffffff; /* fond par défaut */
  transition: background 0.3s ease;
}

body.modal {
  background: rgba(0,0,0,0.5); /* noir transparent pour modale */
}

/* ===== Carte ===== */

.loader-box{
padding:50px 60px;
border-radius:18px;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(12px);
box-shadow:0 20px 50px rgba(0,80,140,0.15);
text-align:center;
min-width:320px;
transform: scale(1.3);
}

/* ===== Logo container ===== */

.logo-container{
position:relative;
width:110px;
height:110px;
margin:0 auto 25px;
}

/* Halo lumineux */

.logo-glow{
position:absolute;
inset:0;
border-radius:50%;
background:radial-gradient(circle,rgba(0,140,255,0.35),transparent 70%);
animation:glow 2.5s ease-in-out infinite;
}

/* Anneau loader */

.loader-ring{
position:absolute;
inset:-22px;
border-radius:50%;
border:3px solid rgba(0,120,200,0.15);
border-top:3px solid #1b6ca8;

animation: spin 2.8s cubic-bezier(.45,.05,.55,.95) infinite;
}

@keyframes spin{
0%{
transform: rotate(0deg);
}
100%{
transform: rotate(360deg);
}
}

/* Logo */

.logo{
position:absolute;
inset:0;
background:url("logog.png") center/contain no-repeat;
animation:breathe 2.4s ease-in-out infinite;
}

/* Animations */

@keyframes breathe{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}



@keyframes glow{
0%{opacity:0.5; transform:scale(0.9);}
50%{opacity:0.9; transform:scale(1.15);}
100%{opacity:0.5; transform:scale(0.9);}
}

/* Texte */

.status{
font-size:14px;
color:#4a6b82;
}

.dots{
display:inline-block;
width:3ch;           /* réserve la place pour ... */
text-align:left;
overflow:hidden;
vertical-align:bottom;
}

.dots::after{
content:" ";
animation:dots 1.5s steps(4,end) infinite;
}

@keyframes dots{
0%   {content:"";}
25%  {content:" .";}
50%  {content:" ..";}
75%  {content:" ...";}
100% {content:"";}
}
.title{ font-size:20px; font-weight:600; color:#1b4f72; margin-bottom:6px; }
.status-line {
  font-size:16px;           
  font-weight:500;
  color:#4a6b82;
  margin-bottom:6px;       
}
</style>
</head>

<body>

<div class="loader-box">

<div class="logo-container">

<div class="logo-glow"></div>
<div class="loader-ring"></div>
<div class="logo"></div>

</div>
<br>
<div class="status-line">Veuillez patienter</div>
<div class="status">
  Chargement en cours<span class="dots"><span>

  
</div>

</div>
<script>


const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get("modal") === "true") {
    document.body.classList.add("modal");
}

</script>
</body>
</html>
